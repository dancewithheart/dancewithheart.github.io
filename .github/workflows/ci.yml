name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.12.1.0"

      - name: Cache cabal
        uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.10.3-cabal-${{ hashFiles('cabal.project', '**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.10.3-cabal-

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
